<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History List</title>
</head>
<body>
<h1>Order History</h1>

<p th:if="${orders == null or #lists.isEmpty(orders)}">No orders found.</p>

<table th:if="${orders != null and !#lists.isEmpty(orders)}" border="1">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Author</th>
        <th>Status</th>
        <th>Order Time</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.author}"></td>
        <td th:text="${order.status}"></td>
        <td th:text="${order.orderTime}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
